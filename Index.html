<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X Video Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0D1117;
      color: #E2E8F0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .logo {
      width: 52px;
      height: 52px;
      background: #000;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #1E2A38;
      flex-shrink: 0;
    }

    .logo svg { display: block; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #F1F5F9;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 13px;
      color: #64748B;
      margin-top: 4px;
    }

    /* Input row */
    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: #161B22;
      border: 1px solid #21262D;
      border-radius: 10px;
      padding: 0 12px;
      transition: border-color 0.2s;
      min-width: 0;
    }

    .input-wrap:focus-within {
      border-color: #1D9BF0;
    }

    .input-icon {
      font-size: 14px;
      margin-right: 8px;
      flex-shrink: 0;
    }

    #url-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #E2E8F0;
      font-size: 14px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      padding: 13px 0;
      min-width: 0;
    }

    #url-input::placeholder { color: #334155; }

    #clear-btn {
      background: none;
      border: none;
      color: #64748B;
      cursor: pointer;
      font-size: 13px;
      padding: 4px 6px;
      flex-shrink: 0;
      display: none;
    }

    #clear-btn:hover { color: #94A3B8; }

    #paste-btn {
      background: #161B22;
      border: 1px solid #21262D;
      border-radius: 10px;
      padding: 0 14px;
      cursor: pointer;
      font-size: 16px;
      color: #94A3B8;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #paste-btn:hover { background: #1C2330; }

    #fetch-btn {
      background: #1D9BF0;
      border: none;
      border-radius: 10px;
      padding: 0 22px;
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.2s, background 0.15s;
      white-space: nowrap;
    }

    #fetch-btn:hover { background: #1a8fd8; }
    #fetch-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Progress bar */
    .progress-bar {
      height: 3px;
      background: #1E2A38;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    .progress-fill {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #1D9BF0, #60BFFF, #1D9BF0);
      background-size: 200% 100%;
      border-radius: 2px;
      animation: shimmer 1.2s linear infinite;
    }

    /* Error box */
    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #FCA5A5;
      display: none;
      align-items: flex-start;
      gap: 8px;
    }

    /* Result card */
    .result-card {
      background: #161B22;
      border: 1px solid #21262D;
      border-radius: 14px;
      overflow: hidden;
      display: none;
    }

    .tweet-preview {
      display: flex;
      gap: 14px;
      padding: 16px 18px;
      border-bottom: 1px solid #21262D;
    }

    #tweet-thumb {
      width: 80px;
      height: 54px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
      background: #0D1117;
      display: none;
    }

    .tweet-meta { flex: 1; min-width: 0; }

    .author-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .author-name { font-weight: 600; font-size: 14px; color: #F1F5F9; }
    .author-handle { font-size: 13px; color: #64748B; }

    .tweet-text {
      font-size: 13px;
      color: #94A3B8;
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .quality-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 18px 8px;
    }

    .quality-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
    }

    .quality-count { font-size: 12px; color: #475569; }

    .quality-list {
      padding: 0 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .quality-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0D1117;
      border-radius: 8px;
      padding: 10px 14px;
      border: 1px solid #1E2A38;
    }

    .quality-info { display: flex; align-items: center; gap: 10px; }

    .quality-badge {
      font-size: 11px;
      font-weight: 700;
      color: white;
      padding: 3px 8px;
      border-radius: 5px;
      letter-spacing: 0.04em;
    }

    .quality-dims {
      font-size: 12px;
      color: #64748B;
      font-family: 'JetBrains Mono', monospace;
    }

    .dl-btn {
      background: #1D9BF0;
      border: none;
      border-radius: 7px;
      padding: 7px 14px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.2s, background 0.15s;
      white-space: nowrap;
    }

    .dl-btn:hover { background: #1a8fd8; }
    .dl-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .disclaimer {
      padding: 10px 18px 14px;
      font-size: 11px;
      color: #334155;
      border-top: 1px solid #1A222E;
    }

    /* Hint grid */
    .hint-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .hint-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #161B22;
      border: 1px solid #1E2A38;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #94A3B8;
    }

    .hint-icon { font-size: 18px; flex-shrink: 0; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    .spinner-sm { width: 12px; height: 12px; }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 480px) {
      .hint-box { grid-template-columns: 1fr; }
      #fetch-btn { padding: 0 16px; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.91-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
    </div>
    <div>
      <h1>X Video Downloader</h1>
      <p class="subtitle">Paste a post URL · pick your quality · save MP4</p>
    </div>
  </div>

  <!-- Input row -->
  <div class="input-row">
    <div class="input-wrap">
      <span class="input-icon">🔗</span>
      <input id="url-input" type="text" placeholder="https://x.com/user/status/…" spellcheck="false" autocomplete="off" />
      <button id="clear-btn" title="Clear">✕</button>
    </div>
    <button id="paste-btn" title="Paste from clipboard">📋</button>
    <button id="fetch-btn">Fetch</button>
  </div>

  <!-- Progress bar -->
  <div class="progress-bar" id="progress-bar">
    <div class="progress-fill"></div>
  </div>

  <!-- Error -->
  <div class="error-box" id="error-box">
    <span>⚠️</span>
    <span id="error-msg"></span>
  </div>

  <!-- Result card -->
  <div class="result-card" id="result-card">
    <div class="tweet-preview">
      <img id="tweet-thumb" alt="thumbnail" />
      <div class="tweet-meta">
        <div class="author-row">
          <span class="author-name" id="author-name"></span>
          <span class="author-handle" id="author-handle"></span>
        </div>
        <p class="tweet-text" id="tweet-text"></p>
      </div>
    </div>
    <div class="quality-header">
      <span class="quality-label">Available qualities</span>
      <span class="quality-count" id="quality-count"></span>
    </div>
    <div class="quality-list" id="quality-list"></div>
    <p class="disclaimer">Downloads are for personal use only. Respect content creators and platform ToS.</p>
  </div>

  <!-- Idle hints -->
  <div class="hint-box" id="hint-box">
    <div class="hint-item"><span class="hint-icon">📎</span><span>Works with twitter.com and x.com links</span></div>
    <div class="hint-item"><span class="hint-icon">🎬</span><span>Downloads MP4 in original quality</span></div>
    <div class="hint-item"><span class="hint-icon">🔒</span><span>Public tweets only</span></div>
    <div class="hint-item"><span class="hint-icon">⚡</span><span>No sign-in required</span></div>
  </div>

</div>

<script>
  const API = 'https://api.tiklydown.eu.org/api/download/tweet?url=';

  const QUALITY_LABELS = { 2160:'4K', 1440:'2K', 1080:'1080p', 720:'720p', 480:'480p', 360:'360p', 240:'240p' };

  function qualityLabel(h) { return QUALITY_LABELS[h] || (h ? h + 'p' : '?'); }

  function badgeColor(h) {
    if (h >= 1080) return '#1D9BF0';
    if (h >= 720)  return '#10B981';
    if (h >= 480)  return '#F59E0B';
    return '#6B7280';
  }

  function isValidUrl(url) {
    return /^https?:\/\/(www\.)?(twitter\.com|x\.com)\/.+\/status\/\d+/.test(url.trim());
  }

  // Elements
  const urlInput     = document.getElementById('url-input');
  const clearBtn     = document.getElementById('clear-btn');
  const pasteBtn     = document.getElementById('paste-btn');
  const fetchBtn     = document.getElementById('fetch-btn');
  const progressBar  = document.getElementById('progress-bar');
  const errorBox     = document.getElementById('error-box');
  const errorMsg     = document.getElementById('error-msg');
  const resultCard   = document.getElementById('result-card');
  const hintBox      = document.getElementById('hint-box');
  const qualityList  = document.getElementById('quality-list');
  const qualityCount = document.getElementById('quality-count');
  const authorName   = document.getElementById('author-name');
  const authorHandle = document.getElementById('author-handle');
  const tweetText    = document.getElementById('tweet-text');
  const tweetThumb   = document.getElementById('tweet-thumb');

  let downloadingIdx = null;

  function setStatus(s) {
    progressBar.style.display = s === 'loading' ? 'block' : 'none';
    errorBox.style.display    = s === 'error'   ? 'flex'  : 'none';
    resultCard.style.display  = s === 'success' ? 'block' : 'none';
    hintBox.style.display     = s === 'idle'    ? 'grid'  : 'none';
    fetchBtn.disabled         = s === 'loading';

    if (s === 'loading') {
      fetchBtn.innerHTML = '<span class="spinner"></span>';
    } else {
      fetchBtn.textContent = 'Fetch';
    }
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    setStatus('error');
  }

  function reset() {
    qualityList.innerHTML = '';
    setStatus('idle');
  }

  urlInput.addEventListener('input', () => {
    clearBtn.style.display = urlInput.value ? 'block' : 'none';
  });

  clearBtn.addEventListener('click', () => {
    urlInput.value = '';
    clearBtn.style.display = 'none';
    reset();
    urlInput.focus();
  });

  urlInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doFetch();
  });

  pasteBtn.addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      urlInput.value = text;
      clearBtn.style.display = text ? 'block' : 'none';
      urlInput.focus();
    } catch {
      urlInput.focus();
    }
  });

  fetchBtn.addEventListener('click', doFetch);

  async function doFetch() {
    const url = urlInput.value.trim();
    if (!url) return;

    if (!isValidUrl(url)) {
      showError('Paste a valid Twitter/X post URL — e.g. https://x.com/user/status/123…');
      return;
    }

    qualityList.innerHTML = '';
    setStatus('loading');

    try {
      const res = await fetch(API + encodeURIComponent(url));
      if (!res.ok) throw new Error('Server returned ' + res.status);
      const data = await res.json();

      if (!data || data.error) {
        throw new Error(data?.message || 'This tweet has no downloadable video, or is private.');
      }

      const rawVideos = data.video || data.media?.video || [];
      if (!rawVideos.length) {
        throw new Error('No video found in this tweet. It may be image-only or protected.');
      }

      const sorted = [...rawVideos].sort((a, b) => (b.height || 0) - (a.height || 0));

      // Populate tweet preview
      const thumb = data.thumbnail || sorted[0]?.thumbnail || null;
      if (thumb) {
        tweetThumb.src = thumb;
        tweetThumb.style.display = 'block';
      } else {
        tweetThumb.style.display = 'none';
      }

      authorName.textContent   = data.author?.name || data.user_name || '';
      authorHandle.textContent = data.author?.screen_name ? '@' + data.author.screen_name : (data.screen_name ? '@' + data.screen_name : '');
      const txt = data.text || data.description || '';
      tweetText.textContent = txt.length > 160 ? txt.slice(0, 160) + '…' : txt;

      qualityCount.textContent = sorted.length + ' option' + (sorted.length !== 1 ? 's' : '');

      // Render quality rows
      sorted.forEach((v, idx) => {
        const row = document.createElement('div');
        row.className = 'quality-row';

        const info = document.createElement('div');
        info.className = 'quality-info';

        const badge = document.createElement('span');
        badge.className = 'quality-badge';
        badge.textContent = qualityLabel(v.height);
        badge.style.background = badgeColor(v.height);

        const dims = document.createElement('span');
        dims.className = 'quality-dims';
        let dimText = '';
        if (v.width && v.height) dimText += v.width + '×' + v.height;
        if (v.size) dimText += (dimText ? ' · ' : '') + (v.size / 1024 / 1024).toFixed(1) + ' MB';
        dims.textContent = dimText;

        info.appendChild(badge);
        info.appendChild(dims);

        const btn = document.createElement('button');
        btn.className = 'dl-btn';
        btn.innerHTML = '⬇ Download';
        btn.dataset.idx = idx;
        btn.addEventListener('click', () => handleDownload(v.url, idx, v.height, btn, sorted));

        row.appendChild(info);
        row.appendChild(btn);
        qualityList.appendChild(row);
      });

      setStatus('success');

    } catch (err) {
      showError(err.message || 'Failed to fetch video. Check the URL and try again.');
    }
  }

  async function handleDownload(videoUrl, idx, height, btn, allVideos) {
    if (downloadingIdx !== null) return;
    downloadingIdx = idx;

    // Disable all download buttons
    document.querySelectorAll('.dl-btn').forEach(b => {
      b.disabled = true;
      if (parseInt(b.dataset.idx) === idx) {
        b.innerHTML = '<span class="spinner spinner-sm"></span> Saving…';
      }
    });

    try {
      const res = await fetch(videoUrl);
      if (!res.ok) throw new Error('fetch failed');
      const blob = await res.blob();
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = 'tweet-video-' + qualityLabel(height) + '.mp4';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
    } catch {
      // CORS fallback — open direct link in new tab
      window.open(videoUrl, '_blank');
    } finally {
      downloadingIdx = null;
      document.querySelectorAll('.dl-btn').forEach(b => {
        b.disabled = false;
        const i = parseInt(b.dataset.idx);
        b.innerHTML = '⬇ Download';
      });
    }
  }

  // Init
  setStatus('idle');
</script>
</body>
</html>
